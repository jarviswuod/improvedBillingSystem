spring:
  application:
    name: ImprovedBillingSystem
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:postgresql://postgres:5432/billing
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    root: info
    org:
      springframework:
        data:
          postgresql: debug
        web: debug
    com:
      jarviswuod:
        improvedbillingsystem: info
